name: Update Formulas

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        formula:
          - name: dijo
            repo: 1995parham/dijo
          - name: gotz
            repo: merschformann/gotz
          - name: toipe
            repo: Samyak2/toipe
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get latest release
        id: latest
        uses: actions/github-script@v9
        with:
          script: |
            const [owner, repo] = '${{ matrix.formula.repo }}'.split('/');
            const { data: release } = await github.rest.repos.getLatestRelease({ owner, repo });
            core.setOutput('version', release.tag_name);
            core.setOutput('url', release.html_url);

      - name: Update formula
        id: update
        run: |
          python3 scripts/update-formula.py "${{ matrix.formula.name }}.rb" "${{ steps.latest.outputs.version }}"
          if git diff --quiet -- "${{ matrix.formula.name }}.rb"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update ${{ matrix.formula.name }} to ${{ steps.latest.outputs.version }}"
          branch: "update/${{ matrix.formula.name }}"
          delete-branch: true
          title: "Update ${{ matrix.formula.name }} to ${{ steps.latest.outputs.version }}"
          body: |
            Automated update of `${{ matrix.formula.name }}` to **${{ steps.latest.outputs.version }}**.

            The `version` line was bumped and every `sha256` recomputed from the
            release artifacts by `scripts/update-formula.py`.

            Release notes: ${{ steps.latest.outputs.url }}
          labels: |
            formula-update
            automated
